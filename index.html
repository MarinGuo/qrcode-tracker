<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代理商追踪系统 - 管理后台</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2qZZZxT-1DOVgg44vaStEFq1omOqcYVU",
            authDomain: "qr-tracker-54ced.firebaseapp.com",
            projectId: "qr-tracker-54ced",
            storageBucket: "qr-tracker-54ced.firebasestorage.app",
            messagingSenderId: "376226537903",
            appId: "1:376226537903:web:296a7b482e42634fadcf5a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.db = db;
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; color: white; margin-bottom: 30px; font-size: 32px; }
        .card { background: white; border-radius: 16px; padding: 30px; margin-bottom: 20px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2); }
        .card h2 { color: #333; margin-bottom: 20px; font-size: 20px; border-bottom: 2px solid #667eea; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #555; font-weight: 600; }
        input[type="text"], input[type="file"] { width: 100%; padding: 12px; border: 2px solid #e1e1e1; border-radius: 8px; font-size: 14px; transition: border-color 0.3s; }
        input:focus { outline: none; border-color: #667eea; }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4); }
        .btn-danger { background: #ff4757; color: white; }
        .btn-danger:hover { background: #ff3344; }
        .btn-small { padding: 8px 16px; font-size: 12px; }
        .agent-list { margin-top: 20px; }
        .agent-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #f9f9f9; border-radius: 8px; margin-bottom: 10px; }
        .agent-info h3 { color: #333; font-size: 16px; margin-bottom: 5px; }
        .agent-info p { color: #666; font-size: 12px; }
        .agent-actions { display: flex; gap: 10px; align-items: center; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .stat-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 12px; text-align: center; }
        .stat-card h3 { font-size: 32px; margin-bottom: 5px; }
        .stat-card p { font-size: 14px; opacity: 0.9; }
        .wechat-preview { width: 200px; height: 200px; border: 3px dashed #e1e1e1; border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; margin: 0 auto 20px; background: #f9f9f9; }
        .wechat-preview img { max-width: 100%; max-height: 100%; }
        .wechat-preview .placeholder { color: #999; font-size: 14px; text-align: center; padding: 20px; }
        .visit-list { max-height: 400px; overflow-y: auto; }
        .visit-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #f9f9f9; border-radius: 8px; margin-bottom: 8px; }
        .visit-agent { font-weight: 600; color: #333; }
        .visit-time { color: #666; font-size: 12px; }
        .empty-state { text-align: center; color: #999; padding: 40px; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; padding: 15px 25px; border-radius: 8px; opacity: 0; transition: opacity 0.3s; z-index: 1000; }
        .toast.show { opacity: 1; }
        .inline-form { display: flex; gap: 10px; }
        .inline-form input { flex: 1; }
        .loading-spinner { text-align: center; padding: 40px; color: #666; }
        .success { color: #28a745; }
        .error { color: #dc3545; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 代理商追踪系统</h1>

        <div class="grid">
            <div class="card">
                <h2>1️⃣ 微信二维码</h2>
                <div class="wechat-preview" id="wechatPreview">
                    <div class="placeholder">请上传微信二维码</div>
                </div>
                <input type="file" id="wechatQrInput" accept="image/*">
                <p style="color: #666; font-size: 12px; margin-top: 10px;">上传你的微信二维码图片，客户扫码后将看到此二维码</p>
            </div>

            <div class="card">
                <h2>2️⃣ 添加代理商</h2>
                <div class="form-group">
                    <label>代理商名称</label>
                    <div class="inline-form">
                        <input type="text" id="agentName" placeholder="输入代理商名称，如：张三">
                        <button class="btn btn-primary" id="addAgentBtn">添加</button>
                    </div>
                </div>
                <p style="color: #666; font-size: 12px; margin-top: 10px;">添加代理商后，可以生成专属追踪二维码给他们</p>
            </div>
        </div>

        <div class="card">
            <h2>3️⃣ 代理商管理</h2>
            <div class="stats">
                <div class="stat-card">
                    <h3 id="totalAgents">-</h3>
                    <p>代理商数量</p>
                </div>
                <div class="stat-card">
                    <h3 id="totalVisits">-</h3>
                    <p>总访问次数</p>
                </div>
            </div>
            <div class="agent-list" id="agentList">
                <div class="loading-spinner">加载中...</div>
            </div>
        </div>

        <div class="card">
            <h2>4️⃣ 访问记录</h2>
            <div class="visit-list" id="visitList">
                <div class="loading-spinner">加载中...</div>
            </div>
        </div>

        <div class="card" style="background: #d4edda; border: 2px solid #28a745;">
            <h2 style="border-color: #28a745; color: #155724;">✅ 在线版本已就绪</h2>
            <p style="color: #155724; line-height: 1.6;">
                <strong>当前为在线版本：</strong><br>
                1. 所有数据存储在 Firebase 云端<br>
                2. 生成的二维码链接为完整 URL，可正常扫码<br>
                3. 部署到 GitHub Pages 后，客户可正常访问<br>
                4. 数据实时同步，随时查看统计
            </p>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script type="module">
        import { collection, addDoc, getDocs, deleteDoc, doc, query, orderBy, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js";

        const db = window.db;

        let agents = [];
        let visits = [];
        let wechatQrUrl = null;

        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.background = type === 'error' ? '#dc3545' : '#333';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function generateAgentId() {
            return 'agent_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        }

        async function loadAgents() {
            try {
                const q = query(collection(db, 'agents'), orderBy('createdAt', 'desc'));
                const querySnapshot = await getDocs(q);
                agents = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderAgents();
            } catch (error) {
                console.error('加载代理商失败:', error);
                showToast('加载代理商失败: ' + error.message, 'error');
            }
        }

        async function loadVisits() {
            try {
                const q = query(collection(db, 'visits'), orderBy('timestamp', 'desc'));
                const querySnapshot = await getDocs(q);
                visits = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderVisits();
                updateStats();
            } catch (error) {
                console.error('加载访问记录失败:', error);
            }
        }

        async function loadWechatQr() {
            try {
                const docRef = doc(db, "config", "wechatQr");
                const docSnap = await getDoc(docRef);
                
                if (docSnap.exists() && docSnap.data().value) {
                    wechatQrUrl = docSnap.data().value;
                    const preview = document.getElementById('wechatPreview');
                    preview.innerHTML = `<img src="${wechatQrUrl}" alt="微信二维码">`;
                }
            } catch (error) {
                console.log('暂无微信二维码');
            }
        }

        async function addAgent() {
            const nameInput = document.getElementById('agentName');
            const name = nameInput.value.trim();

            if (!name) {
                showToast('请输入代理商名称', 'error');
                return;
            }

            const btn = document.getElementById('addAgentBtn');
            btn.disabled = true;
            btn.textContent = '添加中...';

            try {
                const agent = {
                    name: name,
                    id: generateAgentId(),
                    createdAt: new Date().toISOString()
                };

                await addDoc(collection(db, 'agents'), agent);
                nameInput.value = '';
                await loadAgents();
                showToast(`代理商 "${name}" 已添加`);
            } catch (error) {
                console.error('添加代理商失败:', error);
                showToast('添加失败: ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '添加';
            }
        }

        async function deleteAgent(agentId, agentName) {
            if (!confirm(`确定要删除代理商 "${agentName}" 吗？`)) return;

            try {
                await deleteDoc(doc(db, 'agents', agentId));
                await loadAgents();
                showToast('代理商已删除');
            } catch (error) {
                console.error('删除代理商失败:', error);
                showToast('删除失败: ' + error.message, 'error');
            }
        }

        function generateQRCode(agentId) {
            const qr = qrcode(0, 'M');
            const baseUrl = window.location.origin + window.location.pathname.replace('index.html', '');
            const url = `${baseUrl}landing.html?agent=${agentId}`;
            qr.addData(url);
            qr.make();

            const cellSize = 3;
            const size = cellSize * qr.getModuleCount();
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, size, size);
            ctx.fillStyle = '#000000';

            for (let row = 0; row < qr.getModuleCount(); row++) {
                for (let col = 0; col < qr.getModuleCount(); col++) {
                    if (qr.isDark(row, col)) {
                        ctx.fillRect(col * cellSize, row * cellSize, cellSize, cellSize);
                    }
                }
            }

            return canvas;
        }

        function downloadAgentQR(agentId, agentName) {
            const canvas = generateQRCode(agentId);
            const link = document.createElement('a');
            link.download = `二维码_${agentName}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            showToast('二维码已下载');
        }

        function renderAgents() {
            const agentList = document.getElementById('agentList');

            if (agents.length === 0) {
                agentList.innerHTML = '<div class="empty-state">暂无代理商，请先添加</div>';
                return;
            }

            agentList.innerHTML = agents.map(agent => {
                const visitCount = visits.filter(v => v.agentId === agent.id).length;
                return `
                    <div class="agent-item">
                        <div class="agent-info">
                            <h3>${agent.name}</h3>
                            <p>ID: ${agent.id}</p>
                            <p>带来的访问: ${visitCount} 次</p>
                        </div>
                        <div class="agent-actions">
                            <button class="btn btn-primary btn-small" onclick="downloadAgentQR('${agent.id}', '${agent.name}')">
                                下载二维码
                            </button>
                            <button class="btn btn-danger btn-small" onclick="deleteAgent('${agent.id}', '${agent.name}')">
                                删除
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderVisits() {
            const visitList = document.getElementById('visitList');

            if (visits.length === 0) {
                visitList.innerHTML = '<div class="empty-state">暂无访问记录</div>';
                return;
            }

            visitList.innerHTML = visits.slice(0, 50).map(visit => {
                const agent = agents.find(a => a.id === visit.agentId);
                const agentName = agent ? agent.name : '未知代理商';
                const time = new Date(visit.timestamp).toLocaleString('zh-CN');

                return `
                    <div class="visit-item">
                        <span class="visit-agent">${agentName}</span>
                        <span class="visit-time">${time}</span>
                    </div>
                `;
            }).join('');
        }

        function updateStats() {
            document.getElementById('totalAgents').textContent = agents.length;
            document.getElementById('totalVisits').textContent = visits.length;
        }

        async function handleWechatQrUpload(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function(e) {
                const base64 = e.target.result;
                
                try {
                    showToast('上传中...');
                    
                    await setDoc(doc(db, "config", "wechatQr"), {
                        value: base64,
                        updatedAt: new Date().toISOString()
                    });
                    
                    wechatQrUrl = base64;
                    const preview = document.getElementById('wechatPreview');
                    preview.innerHTML = `<img src="${wechatQrUrl}" alt="微信二维码">`;
                    
                    showToast('微信二维码已上传', 'success');
                } catch (error) {
                    console.error('上传失败:', error);
                    showToast('上传失败: ' + error.message, 'error');
                }
            };
            reader.readAsDataURL(file);
        }

        document.getElementById('addAgentBtn').addEventListener('click', addAgent);
        document.getElementById('agentName').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addAgent();
        });
        document.getElementById('wechatQrInput').addEventListener('change', function() {
            handleWechatQrUpload(this);
        });

        window.downloadAgentQR = downloadAgentQR;
        window.deleteAgent = deleteAgent;

        loadAgents().then(() => loadVisits());
        loadWechatQr();

        setInterval(() => {
            loadAgents();
            loadVisits();
        }, 5000);
    </script>
</body>
</html>
