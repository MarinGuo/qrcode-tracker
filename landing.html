<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加微信</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDoc, doc } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2qZZZxT-1DOVgg44vaStEFq1omOqcYVU",
            authDomain: "qr-tracker-54ced.firebaseapp.com",
            projectId: "qr-tracker-54ced",
            storageBucket: "qr-tracker-54ced.firebasestorage.app",
            messagingSenderId: "376226537903",
            appId: "1:376226537903:web:296a7b482e42634fadcf5a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function recordVisit(agentId) {
            try {
                await addDoc(collection(db, 'visits'), {
                    agentId: agentId,
                    timestamp: new Date().toISOString()
                });
                console.log('访问已记录');
            } catch (error) {
                console.error('记录访问失败:', error);
            }
        }

        async function loadWechatQr() {
            try {
                const docRef = doc(db, "config", "wechatQr");
                const docSnap = await getDoc(docRef);
                
                if (docSnap.exists() && docSnap.data().value) {
                    return docSnap.data().value;
                }
                return null;
            } catch (error) {
                console.error('加载微信二维码失败:', error);
                return null;
            }
        }

        async function renderPage() {
            const urlParams = new URLSearchParams(window.location.search);
            const agentId = urlParams.get('agent');
            const content = document.getElementById('content');

            if (agentId) {
                await recordVisit(agentId);
            }

            const wechatQrUrl = await loadWechatQr();

            if (wechatQrUrl) {
                content.innerHTML = `
                    <div class="qr-container">
                        <img src="${wechatQrUrl}" alt="微信二维码">
                    </div>
                    <p class="tip">长按识别二维码添加我为好友</p>
                    <div class="steps">
                        <div class="step">
                            <span class="step-number">1</span>
                            <span class="step-text">长按上方二维码图片</span>
                        </div>
                        <div class="step">
                            <span class="step-number">2</span>
                            <span class="step-text">选择"识别图中二维码"</span>
                        </div>
                        <div class="step">
                            <span class="step-number">3</span>
                            <span class="step-text">在微信中添加我为好友</span>
                        </div>
                    </div>
                `;
            } else {
                content.innerHTML = '<div class="no-qr">暂无微信二维码，请联系管理员</div>';
            }
        }

        window.addEventListener('DOMContentLoaded', renderPage);
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 20px; padding: 40px; max-width: 400px; width: 100%; text-align: center; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); }
        .qr-container { width: 250px; height: 250px; margin: 0 auto 20px; border: 3px solid #667eea; border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; background: white; }
        .qr-container img { max-width: 100%; max-height: 100%; }
        .tip { color: #666; font-size: 16px; margin-bottom: 20px; }
        .steps { text-align: left; background: #f9f9f9; border-radius: 12px; padding: 20px; margin-top: 20px; }
        .step { display: flex; align-items: flex-start; margin-bottom: 15px; }
        .step:last-child { margin-bottom: 0; }
        .step-number { width: 28px; height: 28px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; margin-right: 12px; flex-shrink: 0; }
        .step-text { color: #333; font-size: 14px; line-height: 1.5; }
        .loading { color: #999; font-size: 14px; padding: 60px 0; }
        .no-qr { color: #ff4757; font-size: 14px; padding: 40px 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="content">
            <div class="loading">加载中...</div>
        </div>
    </div>
</body>
</html>
